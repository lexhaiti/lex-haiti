# GitHub Actions — build the backend image, push to Azure Container
# Registry, and roll the API + worker Container Apps to the new
# revision. Fired on push to ``main`` (prod) and on workflow_dispatch
# (manual redeploys).
#
# Required GitHub secrets / variables (set in repo settings):
#   AZURE_CREDENTIALS          — JSON output of `az ad sp create-for-rbac`
#   AZURE_RESOURCE_GROUP       — e.g. "lex-haiti-prod"
#   AZURE_REGISTRY_NAME        — e.g. "lexhaitiregistry" (no .azurecr.io)
#   AZURE_API_APP              — Container App name for the API, e.g. "lex-haiti-api"
#   AZURE_WORKER_APP           — Container App name for the RQ worker, e.g. "lex-haiti-worker"
#
# The az cli + container login both authenticate via the AZURE_CREDENTIALS
# service principal — same identity, two consumers.

name: deploy-azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:

concurrency:
  group: deploy-azure
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.AZURE_REGISTRY_NAME }}"

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          REGISTRY="${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io"
          echo "image_sha=${REGISTRY}/lex-haiti-backend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/lex-haiti-backend:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image_sha }}
            ${{ steps.tags.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image_latest }}
          cache-to: type=inline

      - name: Run Alembic migrations
        # One-off Container Apps Job that runs scripts/run_migrations.py
        # against prod using the freshly built image. Migrations run
        # BEFORE the API/worker revisions roll, so new code never sees
        # the old schema. Job is started + waited on; a non-zero exit
        # fails the deploy and the API/worker stay on the previous
        # revision.
        #
        # Idempotent: alembic upgrade head is a no-op when the DB is
        # already at head, so re-running the workflow is safe.
        #
        # We ``job update`` the image first, then ``job start`` with no
        # overrides. Passing ``--image`` (or ``--command``) directly to
        # ``job start`` builds an inline container override that drops
        # the Job's configured ``command`` and env vars — so the Job
        # falls back to the image's default CMD (``uvicorn ...``),
        # runs the API for 10 min instead of migrating, and fails.
        # Updating the Job first preserves the configured command and
        # the DATABASE_URL secretref.
        run: |
          set -euo pipefail
          az containerapp job update \
            --name "lex-haiti-migrate" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.tags.outputs.image_sha }}" \
            --output none
          EXECUTION=$(az containerapp job start \
            --name "lex-haiti-migrate" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "id" -o tsv)
          if [ -z "$EXECUTION" ]; then
            echo "::error::Failed to start the migration job. Has lex-haiti-migrate been created? See infra/azure/deploy.sh."
            exit 1
          fi
          # Poll the execution status until it succeeds or fails.
          # Container Apps Jobs end in either Succeeded, Failed, or
          # Stopped. Anything other than Succeeded means we abort
          # before rolling the API.
          EXEC_NAME="${EXECUTION##*/}"
          echo "Migration job execution: $EXEC_NAME"
          for i in {1..60}; do
            STATUS=$(az containerapp job execution show \
              --name "lex-haiti-migrate" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --job-execution-name "$EXEC_NAME" \
              --query "properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "  [$i/60] status=$STATUS"
            case "$STATUS" in
              Succeeded) echo "Migration succeeded."; exit 0 ;;
              Failed|Stopped|Degraded)
                echo "::error::Migration $STATUS — aborting deploy. See logs:"
                echo "  az containerapp job execution show -n lex-haiti-migrate -g ${{ secrets.AZURE_RESOURCE_GROUP }} --job-execution-name $EXEC_NAME"
                exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::Migration job timed out after 10 minutes."
          exit 1

      - name: Roll API to new revision
        # ``--set-env-vars APP_ENV=production`` is idempotent — the
        # backend reads this flag to drop ``http://localhost`` from
        # the CORS allowlist, so it's worth re-asserting on every
        # deploy in case the value gets cleared by a manual edit.
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_API_APP }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.tags.outputs.image_sha }}" \
            --set-env-vars APP_ENV=production

      - name: Roll worker to new revision
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_WORKER_APP }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.tags.outputs.image_sha }}" \
            --set-env-vars APP_ENV=production
