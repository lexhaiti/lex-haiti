[alembic]
# alembic.ini lives in the same folder as env.py.
# %(here)s expands to alembic.ini's directory regardless of invocation cwd,
# so this works whether run from the project root or anywhere else.
# Recommended: `make migrate` (or `alembic -c backend/migrations/alembic.ini upgrade head`).
script_location = %(here)s
# Project root (backend/) must be on sys.path for `from api.* / services.* / ...` imports in env.py.
prepend_sys_path = %(here)s/..
version_path_separator = os
sqlalchemy.url = postgresql+psycopg2://lexhaiti:lexhaiti@localhost:5432/lexhaiti

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
